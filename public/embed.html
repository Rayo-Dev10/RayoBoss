<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>UNIOC Radio — Señal pública</title>
<link rel="stylesheet" href="/css/embed.css">
</head>
<body>
<main>
  <div class="brand"><b>RayoBoss</b><span id="mode">Conectando</span></div>
  <div class="stage">
    <video id="video" playsinline autoplay controls class="hidden"></video>
    <audio id="audio" autoplay controls class="hidden"></audio>
    <div id="poster" class="poster"><div class="pulse"></div><h1 id="title">UNIOC Radio</h1><p id="meta">Preparando señal…</p></div>
  </div>
  <button id="unlock" class="unlock hidden">Activar sonido</button>
  <p id="status" class="status" aria-live="polite"></p>
</main>
<script src="/js/embed.js"></script>
</body>
</html>
